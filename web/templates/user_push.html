{% extends 'base.html' %}

{% block content %}
  <section class="page-head">
    <div>
      <p class="eyebrow">Device enrollment</p>
      <h1>Push {{ user.name }}</h1>
      <p class="muted">Global ID {{ user.global_user_id }}</p>
    </div>
  </section>

  <section class="panel narrow">
    <form class="form" method="post" action="/users/{{ user.id }}/push">
      <label for="push-device">Device
        <select id="push-device" name="device_id">
          {% for d in devices %}
          <option value="{{ d.id }}">{{ d.name }} - {{ d.ip_address }}:{{ d.port }}</option>
          {% endfor %}
        </select>
      </label>
      <button class="btn btn-primary" type="submit" aria-label="Push {{ user.name }} to selected device">Push to device</button>
    </form>
  </section>
{% endblock %}
