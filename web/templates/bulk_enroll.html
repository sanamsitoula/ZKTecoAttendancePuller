{% extends 'base.html' %}

{% block content %}
  <h1>Bulk Enroll</h1>
  <form method="post" action="/bulk-enroll">
    <label for="be-device">Device
      <select id="be-device" name="device_id">
        {% for d in devices %}
        <option value="{{ d.id }}">{{ d.name }} — {{ d.ip_address }}</option>
        {% endfor %}
      </select>
    </label>
    <label for="be-users">Users (comma-separated IDs) — leave blank for all users<br>
      <input id="be-users" name="user_ids" placeholder="e.g. 1,2,3">
    </label>
    <button type="submit">Enroll</button>
  </form>
{% endblock %}
