<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login &mdash; ZKTeco Attendance</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 40px 44px 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #1769e0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .login-logo .logo-icon svg { fill: #fff; }
    .login-logo h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 2px;
      color: #1e293b;
    }
    .login-logo p {
      font-size: 12px;
      color: #64748b;
      margin: 0;
    }
    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    .login-card input[type=text],
    .login-card input[type=password] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color .15s;
      outline: none;
    }
    .login-card input:focus {
      border-color: #1769e0;
      box-shadow: 0 0 0 3px rgba(23,105,224,.12);
    }
    .login-card .field { margin-bottom: 16px; }
    .login-card .btn-login {
      width: 100%;
      padding: 11px;
      background: #1769e0;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
    }
    .login-card .btn-login:hover { background: #1255b8; }
    .login-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 7px;
      padding: 9px 13px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .login-footer {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 22px;
    }
    @media (max-width: 440px) {
      html, body { align-items: flex-start; padding-top: 40px; }
      .login-card {
        padding: 28px 20px 24px;
        border-radius: 10px;
        max-width: 96vw;
      }
      .login-card input[type=text],
      .login-card input[type=password] {
        padding: 12px 12px;
        font-size: 16px; /* prevents iOS auto-zoom */
        min-height: 44px;
      }
      .login-card .btn-login {
        padding: 13px;
        font-size: 16px;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/>
      </svg>
    </div>
    <h1>ZKTeco Attendance</h1>
    <p>Sign in to continue</p>
  </div>

  {% if error %}
  <div class="login-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="{{ username or '' }}"
             autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>

  <div class="login-footer">ZKTeco Attendance Management System</div>
</div>
</body>
</html>
